logging:
  # Load external Logback config for structured JSON access logging.
  # The file is injected at deploy time via Docker Compose configs: — see docker-compose.yml.
  # See docs/access-logging.md for field reference and log consumption guidance.
  config: file:/app/config/logback-spring.xml

spring:
  datasource:
    # Connects to the PostgreSQL container defined in docker-compose.yml.
    # "db" resolves to the db service hostname within the Docker network.
    # See docs/configuration.md#spring-datasource for production credential guidance.
    url: 'jdbc:postgresql://db:5432/hapi'
    username: admin
    password: admin
    driverClassName: org.postgresql.Driver
  jpa:
    properties:
      # HAPI's PostgreSQL-specific Hibernate dialect. Required — do not substitute.
      hibernate.dialect: ca.uhn.fhir.jpa.model.dialect.HapiFhirPostgresDialect
      # Hibernate Search (Lucene backend) enables _text and _content FHIR search params.
      # HapiHSearchAnalysisConfigurers$HapiLuceneAnalysisConfigurer registers HAPI's custom
      # analyzers (exactAnalyzer, standardAnalyzer, autocomplete* etc.) that Lucene requires
      # at bootstrap. The index is written to /app/target/lucenefiles, mounted as a volume.
      # See docs/configuration.md#hibernate-search--lucene
      hibernate.search.enabled: true
      hibernate.search.backend.type: lucene
      hibernate.search.backend.analysis.configurer: ca.uhn.fhir.jpa.search.HapiHSearchAnalysisConfigurers$HapiLuceneAnalysisConfigurer
      hibernate.search.backend.directory.type: local-filesystem
      hibernate.search.backend.directory.root: /data/hapi/lucenefiles

hapi:
  fhir:
    fhir_version: R4

    # Large code systems (v3-Race, v3-ActCode, etc.) are indexed synchronously on
    # first boot rather than deferred to background jobs. Slower first boot, but
    # eliminates the startup race where valid codes return false for ~30s.
    # See docs/configuration.md#terminology-deferred-indexing
    defer_indexing_for_codesystems_of_size: 100000

    # Allow packages with status=draft to be installed. Without this, HAPI silently
    # skips all StructureDefinitions, ValueSets, and CodeSystems that carry
    # status=draft, which causes profile validation to silently pass for those types
    # (no rule loaded → no enforcement). PH Core and PH eReferral ship draft resources.
    # See docs/known-issues.md#c-profile-validation-inactive-for-draft-status-igs
    validate_resource_status_for_package_upload: false

    # Repository validation: rejects writes that fail active profile conformance.
    # See docs/configuration.md#validation
    validation:
      requests_enabled: true
      responses_enabled: false

    # MDM: automatic patient deduplication using PhilSys/PhilHealth EIDs and
    # name+DOB similarity. Rules file is mounted at /app/config/mdm-rules.json.
    # See docs/configuration.md#hapimdm-rulesjson
    mdm_enabled: true
    mdm_rules_json_location: "mdm-rules.json"

    # Enable extended Lucene indexing and _text/_content search parameters.
    # Requires hibernate.search.enabled: true above.
    advanced_lucene_indexing: true
    search_index_full_text_enabled: true

    # Structured per-request access logging for statistical accounting.
    # The LoggingInterceptor is active by default in the HAPI starter; these keys
    # configure the format and logger name. Output is routed to JSON via logback-spring.xml.
    # Fields: HTTP verb/path, FHIR operation type/name, resource, remote IP, forwarded-for,
    # User-Agent, request ID, query params, processing time. Request body is NOT logged.
    # See docs/access-logging.md for field reference and consumption guidance.
    logger:
      name: fhirtest.access
      format: "verb=${requestVerb} path=${servletPath} op=${operationType} opName=${operationName} resource=${idOrResourceName} remoteAddr=${remoteAddr} forwardedFor=${requestHeader.x-forwarded-for} userAgent=${requestHeader.user-agent} requestId=${requestId} params=${requestParameters} processingMs=${processingTimeMillis}"
      error_format: "verb=${requestVerb} path=${requestUrl} op=${operationType} resource=${idOrResourceName} remoteAddr=${remoteAddr} requestId=${requestId} error=${exceptionMessage}"
      log_exceptions: true

    # custom_content_path is DISABLED — broken in HAPI 8.10.0 (trailing slash bug).
    # CustomContentFilesConfigurer strips the trailing slash from the path, causing
    # Spring's ResourceHandlerRegistration to throw "does not end with slash".
    # The fix is merged to HAPI master. Re-enable when a fixed release is published.
    # See docs/known-issues.md#g-custom-content-path-broken-in-hapi-8100
    # custom_content_path: /app/config/

    # Allow references to resources hosted on external FHIR servers.
    # Required by Philippine IGs that reference national registry identifiers.
    allow_external_references: true

    # Remote terminology services for codes not resolvable locally.
    # Requires outbound internet access from the container.
    # See docs/configuration.md#remote-terminology-services for offline alternatives.
    remote_terminology_service:
      loinc:
        system: "http://loinc.org"
        url: "https://tx.fhirlab.net/fhir"
      snomed:
        system: "http://snomed.info/sct"
        url: "https://tx.fhirlab.net/fhir"
      ucum:
        # Note: tx.fhirlab.net does not support UCUM; use HL7 reference server.
        # The UCUM fragment (scripts/upload.sh step 1b) handles codes listed there.
        # See docs/known-issues.md#a-hapi-v8100-ucum-chain-regression--issue-7796
        system: "http://unitsofmeasure.org"
        url: "https://tx.fhir.org/r4"

    # Pre-load Philippine FHIR packages on first boot.
    # Use PH_CORE_VERSION / PH_EREFERRAL_VERSION env vars to override versions.
    # reloadExisting: false means subsequent restarts skip re-download (fast).
    # See docs/configuration.md#implementation-guides and docs/adding-igs.md
    implementationguides:
      ph_core:
        name: fhir.ph.core
        version: "${PH_CORE_VERSION:0.1.1}"
        reloadExisting: false
        installMode: STORE_AND_INSTALL
        fetchDependencies: true
        packageUrl: "https://jgsuess.github.io/ph-core/${PH_CORE_VERSION:0.1.1}/package.tgz"
        dependencyExcludes:
          - "hl7.fhir.uv.extensions"
          - "hl7.fhir.uv.extensions.r4"
          - "hl7.terminology"
      ph_ereferral:
        name: fhir.ph.ereferral
        version: "${PH_EREFERRAL_VERSION:0.3.1}"
        reloadExisting: false
        installMode: STORE_AND_INSTALL
        fetchDependencies: true
        packageUrl: "https://jgsuess.github.io/ph-ereferral/${PH_EREFERRAL_VERSION:0.3.1}/package.tgz"
        dependencyExcludes:
          - "hl7.fhir.uv.extensions"
          - "hl7.fhir.uv.extensions.r4"
          - "hl7.terminology"
          - "fhir.ph.core"
      # hl7.fhir.uv.extensions.r4 loaded explicitly to provide R4-transformed extension
      # definitions. The base hl7.fhir.uv.extensions package is R5-centric and causes
      # type mismatches on Device, DeviceDefinition, and related resources when loaded
      # in R4 mode (e.g. device-implantStatus expects code in R4 but CodeableConcept in
      # R5). Loading the .r4 variant instead provides correct R4 type definitions.
      # Both variants are excluded from ph_core/ph_ereferral transitive deps above to
      # prevent double-loading. See docs/known-issues.md#d-hl7-extensions-pack-r4-vs-r5
      hl7_extensions_r4:
        name: hl7.fhir.uv.extensions.r4
        version: "5.3.0"
        reloadExisting: false
        installMode: STORE_AND_INSTALL
        fetchDependencies: true
        installResourceTypes:
          - StructureDefinition
          - SearchParameter
        dependencyExcludes:
          - "hl7.terminology.r5"
          - "hl7.terminology.r4"
